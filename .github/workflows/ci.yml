name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -e ".[dev]"

      - name: Lint (Ruff)
        run: ruff check .

      - name: Tipagem (mypy)
        run: mypy core/ models/ --ignore-missing-imports

      - name: Testes
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: pytest tests/ -v --tb=short --cov=core --cov=models --cov-report=term-missing

      - name: Cobertura mínima 80%
        run: pytest tests/ --cov=core --cov=models --cov-fail-under=80 -q
