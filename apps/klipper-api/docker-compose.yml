services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: klipper_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    command: bundle exec rails server -b 0.0.0.0
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/klipper_development
      RAILS_ENV: development
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
    ports:
      - "3000:3000"
    depends_on:
      - db
    volumes:
      - .:/rails

volumes:
  postgres_data:
