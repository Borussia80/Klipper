name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  scan_ruby:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          working-directory: apps/klipper-api
          bundler-cache: true
      - name: Brakeman security scan
        run: bin/brakeman --no-pager
        working-directory: apps/klipper-api
      - name: Bundler audit
        run: bin/bundler-audit
        working-directory: apps/klipper-api

  lint:
    runs-on: ubuntu-latest
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          working-directory: apps/klipper-api
          bundler-cache: true
      - uses: actions/cache@v4
        with:
          path: apps/klipper-api/tmp/rubocop
          key: rubocop-${{ runner.os }}-${{ hashFiles('apps/klipper-api/.rubocop.yml', 'apps/klipper-api/Gemfile.lock') }}
      - name: RuboCop
        run: bin/rubocop -f github
        working-directory: apps/klipper-api

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: klipper_test
        ports: [ "5432:5432" ]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/klipper_test
      RAILS_ENV: test
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          working-directory: apps/klipper-api
          bundler-cache: true
      - name: Setup database
        run: bundle exec rails db:schema:load
        working-directory: apps/klipper-api
      - name: Run RSpec
        run: bundle exec rspec --format progress
        working-directory: apps/klipper-api
